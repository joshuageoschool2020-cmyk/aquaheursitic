<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heuristic_</title>
    <!-- Importing Tailwind for the dark mode styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center">
    
    <!-- Top Navigation -->
    <header class="w-full max-w-4xl flex justify-between items-center py-6 px-4">
        <div class="text-xl font-bold tracking-tighter">heuristic_</div>
        <div class="flex gap-4">
            <span class="text-sm text-gray-500">Library</span>
            <span class="text-sm bg-gray-900 border border-gray-700 px-3 py-1 rounded-full">Dark Navy</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col items-center justify-center w-full px-4">
        <h1 class="text-5xl font-bold mb-6">Understand faster</h1>
        <div class="h-1 w-12 bg-blue-500 mb-8"></div>
        <div class="text-sm text-gray-500 mb-6 bg-gray-900 px-3 py-1 rounded-full">AI Powered</div>

        <!-- The Engine Input Box -->
        <div class="w-full max-w-2xl bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-2xl">
            <textarea id="userInput" class="w-full h-40 bg-gray-950 p-4 rounded-xl border border-gray-700 focus:outline-none focus:border-blue-500 placeholder-gray-600" placeholder="Paste any text, topic, exam question or concept here."></textarea>
            
            <button id="sendBtn" onclick="analyzeText()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">
                ⚡ Explain This
            </button>
        </div>

        <!-- Output Display -->
        <div id="output" class="mt-8 w-full max-w-2xl text-gray-300 italic p-4"></div>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-gray-600 text-sm">
        <p>Intelligence is equally distributed. Explanation is not. We are fixing that.</p>
        <p class="text-center mt-2">By Obliquity</p>
    </footer>

    <!-- Logic to connect to your Engine -->
    <script>
        async function analyzeText() {
            const btn = document.getElementById('sendBtn');
            const output = document.getElementById('output');
            const text = document.getElementById('userInput').value;
            
            btn.innerText = "Analyzing...";
            btn.disabled = true;
            
            try {
                const response = await fetch('https://heuristic-engine.onrender.com/explain', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                output.innerText = data.result;
            } catch (err) {
                output.innerText = "Error: Could not reach the engine.";
            } finally {
                btn.innerText = "⚡ Explain This";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
